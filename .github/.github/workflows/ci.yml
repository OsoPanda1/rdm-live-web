name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: "true"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show Node & npm versions
        run: |
          node -v
          npm -v

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install submodule deps (packages/*)
        run: |
          set -e
          if [ -d "packages" ]; then
            for dir in packages/*; do
              if [ -f "$dir/package.json" ]; then
                echo "Installing deps in $dir"
                if ! (cd "$dir" && npm ci); then
                  echo "npm ci failed in $dir, trying npm install"
                  (cd "$dir" && npm install) || {
                    echo "::warning::Skipping deps in $dir (no lockfile or install failed)"
                  }
                fi
              fi
            done
          else
            echo "::notice::packages/ directory not found, skipping submodule deps"
          fi

      - name: Roadmap sync (docs ↔ public/roadmap-rdmx.json)
        run: npm run roadmap:sync

      - name: Frontend lint
        run: npm run lint

      - name: Frontend unit tests
        run: npm run test

      - name: Frontend build
        run: npm run build

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright, headless)
        run: npm run test:e2e

      - name: Backend build
        working-directory: server
        run: npm run build

      - name: Prisma migrate deploy (staging-compatible)
        if: ${{ secrets.STAGING_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        working-directory: server
        run: npx prisma migrate deploy
