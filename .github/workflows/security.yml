name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1" # Lunes 06:00 UTC · barrido semanal completo
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write
  id-token: write

concurrency:
  group: security-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9
  AUDIT_LEVEL: high

jobs:
  #
  # 1) Secret scanning de doble capa (Gitleaks + TruffleHog)
  #
  secrets:
    name: Secrets · Gitleaks + TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        scanner: [gitleaks, trufflehog]
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        if: matrix.scanner == 'gitleaks'
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source=. --report-format sarif --report-path gitleaks.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

      - name: Upload Gitleaks SARIF
        if: matrix.scanner == 'gitleaks' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      - name: TruffleHog (PR diff)
        if: matrix.scanner == 'trufflehog' && github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: TruffleHog (full branch)
        if: matrix.scanner == 'trufflehog' && github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --only-verified

  #
  # 2) Dependabot-like audit endurecido (deps + lockfile) con cache agresivo
  #
  deps-audit:
    name: Dependencies · npm/pnpm audit + lock drift
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: secrets
    strategy:
      fail-fast: false
      matrix:
        package-manager: [pnpm, npm]
    env:
      FORCE_COLOR: "1"
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ matrix.package-manager }}

      - name: Install dependencies (pnpm)
        if: matrix.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (npm)
        if: matrix.package-manager == 'npm'
        run: npm ci --legacy-peer-deps

      - name: npm audit (high+critical)
        if: matrix.package-manager == 'npm'
        run: npm audit --audit-level=${{ env.AUDIT_LEVEL }}

      - name: pnpm audit (high+critical)
        if: matrix.package-manager == 'pnpm'
        run: pnpm audit --audit-level=${{ env.AUDIT_LEVEL }}

      - name: better-npm-audit report
        if: matrix.package-manager == 'npm'
        run: npx --yes better-npm-audit audit --level ${{ env.AUDIT_LEVEL }}

      - name: Detect lockfile drift (package-lock vs pnpm-lock/bun.lock*)
        run: |
          echo "Checking lockfiles drift..."
          if [ -f package-lock.json ] && [ -f pnpm-lock.yaml ]; then
            echo "::warning::Multiple lockfiles present (npm + pnpm). Ensure single source of truth."
          fi

  #
  # 3) SAST de alto nivel (CodeQL JS/TS) + cardinalidad controlada
  #
  codeql:
    name: CodeQL JS/TS · SAST
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [secrets, deps-audit]
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app:
          - "apps/web"
          - "services/*"
          - "packages/*"
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: +security-and-quality

      - name: Autobuild monorepo
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis (${{ matrix.app }})
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript/${{ matrix.app }}"

  #
  # 4) Policy-as-code / Zero‑trust de configuración (gitleaks.toml, .npmrc, wrangler, vercel, supabase)
  #
  policy:
    name: Policy-as-Code · Config Hardening
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deps-audit]
    steps:
      - name: Hardened checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate GitHub Actions policies
        run: |
          echo "Validating workflows policy..."
          grep -R "GITHUB_TOKEN" .github/workflows || true

      - name: Validate Supabase / Wrangler / Vercel configs
        run: |
          echo "Scanning for unsafe configurations..."
          ! grep -R "anon-key" supabase  || (echo "::error::Supabase anon key committed"; exit 1)
          ! grep -R "SUPABASE_" .        || true
          ! grep -R "CF_ACCOUNT_ID" .    || true

  #
  # 5) Telemetría y observabilidad del pipeline (cardinalidad controlada)
  #
  telemetry:
    name: Security Telemetry · Job Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [secrets, deps-audit, codeql, policy]
    if: always()
    steps:
      - name: Emit security CI summary
        run: |
          echo "## Security CI · Real del Monte Digital Hub" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Secrets scan: ${{ needs.secrets.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies audit: ${{ needs.deps-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL SAST: ${{ needs.codeql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Policy-as-code: ${{ needs.policy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> All jobs are designed with bounded cardinality in logs and labels for Prometheus/OpenTelemetry." >> $GITHUB_STEP_SUMMARY
