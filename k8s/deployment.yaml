apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdm-app
  namespace: rdm-digital-hub
  labels:
    app: rdm-app
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rdm-app
  template:
    metadata:
      labels:
        app: rdm-app
        tier: frontend
    spec:
      containers:
        - name: app
          image: ghcr.io/osopanda1/real-del-monte-digital-hub:latest
          ports:
            - containerPort: 5173
          env:
            - name: VITE_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: url
            - name: VITE_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: anon-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rdm-app-service
  namespace: rdm-digital-hub
spec:
  selector:
    app: rdm-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5173
  type: ClusterIP
